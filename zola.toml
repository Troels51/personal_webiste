# The URL the site will be built for
base_url = "https://hffmr.dk"

compile_sass = true
build_search_index = true
theme = "anemone"
minify_html = true
generate_feeds = true
generate_sitemap = true

# Taxonomies
taxonomies = [
    {name = "tags", feed = true, paginate_by = 10},
]

# Language
default_language = "en"

[languages.en]
build_search_index = true
title = "Hffmr.dk"
description = "The personal website for Troels Hoffmeyer"

[markdown]
render_emoji = true
external_links_target_blank = true
smart_punctuation = true

[slugify]
paths = "on"
taxonomies = "on"
anchors = "on"

[link_checker]
internal_level = "warn"

# Extra
[extra]
author = "Troels Hoffmeyer"
favicon = "favicon.ico"
list_pages = false
enable_search = true

header_nav = [
  { url = "/", name_en = "home"},
  { url = "/about", name_en = "about" },
  { url = "/blog", name_en = "blog" }
]
